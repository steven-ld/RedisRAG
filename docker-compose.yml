services:
  redis:
    image: redis/redis-stack:latest
    container_name: redis-rag-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-rag-data:/data

  app:
    build:
      context: .
    container_name: redis-rag-app
    depends_on:
      - redis
    environment:
      PORT: "3000"
      REDIS_URL: "redis://redis:6379"
      VECTOR_INDEX_NAME: "rag_idx"
      VECTOR_KEY_PREFIX: "doc:"
      EMBEDDING_DIM: "256"
      EMBEDDING_PROVIDER: "simple"
      DOC_SYNC_REPO_URL: "/doc-repos/RedisRAG-Doc"
      DOC_SYNC_BRANCH: "main"
      DOC_SYNC_DOCS_ROOT: "."
      DOC_SYNC_REPO_NAME: "redisrag-doc"
      DOC_SYNC_INTERVAL_MS: "180000"
    ports:
      - "3000:3000"
    volumes:
      - ${DOC_SYNC_REPO_HOST_PATH:-/Users/ga666666/Desktop/RedisRAG-Doc}:/doc-repos/RedisRAG-Doc

volumes:
  redis-rag-data:
